gateway:
  base_url: http://127.0.0.1:18789
  token: "${OPENCLAW_GATEWAY_TOKEN}" # opzionale se il proxy non chiama il gateway direttamente

backend:
  base_url: http://127.0.0.1:8000
  timeout_seconds: 120

agents:
  - id: "openclaw:contabo"
    name: "Contabo (OpenClaw)"
    description: "Assistente con tono tecnico."
    agent_id: "main"
    tags:
      - openclaw
      - internal

pipeline:
  id: "openclaw-session-filter"
  name: "OpenClaw session bridge"
  description: "Propaga chat_id -> user per sessioni stabili"
  pipelines: ["*"]
  priority: 500
  valves_config: config/pipeline-valves.json
